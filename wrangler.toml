#:schema node_modules/wrangler/config-schema.json

name = "gg-propiedades"
main = ".open-next/worker.js"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# ── Variables no sensibles (públicas) ───────────────────────────────────────
[vars]
NEXTAUTH_URL = "https://ggpropiedades.com"
R2_PUBLIC_URL = "https://pub-bd2ec60177e8464ab87d64b45deb3958.r2.dev"

# ── Secrets sensibles (configurar con: npx wrangler secret put <NOMBRE>) ────
# SUPABASE_URL              ← https://<project>.supabase.co
# SUPABASE_SERVICE_ROLE_KEY ← Dashboard → Settings → API → service_role key
# NEXTAUTH_SECRET
# ADMIN_USERNAME
# ADMIN_PASSWORD
# R2_ACCOUNT_ID
# R2_ACCESS_KEY_ID
# R2_SECRET_ACCESS_KEY
# RESEND_API_KEY

# ── Cache R2 (Next.js ISR / incremental cache) ─────────────────────────────
# Este bucket va en TU cuenta de Cloudflare (la del Worker).
# Crearlo con: npx wrangler r2 bucket create gg-cache
[[r2_buckets]]
binding = "NEXT_CACHE_R2"
bucket_name = "gg-cache"

# ── Assets (HTML, CSS, JS estáticos) ────────────────────────────────────────
[assets]
directory = ".open-next/assets"
binding = "ASSETS"
